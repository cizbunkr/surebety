<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Surebety — fauly / karty / střely</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
         background: #0f1117; color: #e8eaed; padding: 14px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  h1 { font-size: 18px; margin: 0; font-weight: 650; }
  .meta { font-size: 12px; color: #9aa0aa; }
  .filters { display: flex; gap: 6px; margin: 10px 0 14px; flex-wrap: wrap; }
  .chip { font-size: 12px; padding: 5px 11px; border: 1px solid #2b2f3a; border-radius: 999px;
          background: #161a23; color: #cfd3da; cursor: pointer; user-select: none; }
  .chip.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .card { background: #161a23; border: 1px solid #232734; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .match { font-weight: 600; font-size: 15px; }
  .sub { font-size: 12px; color: #9aa0aa; margin-top: 2px; }
  .profit { font-weight: 700; font-size: 16px; color: #1ecb6b; white-space: nowrap; }
  .stat { display: inline-block; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em;
          padding: 2px 7px; border-radius: 5px; background: #222838; color: #aeb6c4; margin-right: 6px; }
  table { width: 100%; border-collapse: collapse; margin-top: 9px; font-size: 13px; }
  td { padding: 5px 4px; border-top: 1px solid #232734; vertical-align: top; }
  .odd { font-weight: 600; }
  .book { color: #9aa0aa; }
  .stake { text-align: right; white-space: nowrap; color: #cfd3da; }
  .warn { font-size: 11.5px; color: #e0a23a; margin-top: 8px; }
  .empty { text-align: center; color: #9aa0aa; padding: 40px 0; }
  footer { text-align: center; font-size: 11px; color: #6b7280; margin-top: 18px; }
</style>
</head>
<body>
<header>
  <h1>⚽ Surebety — fauly / karty / střely</h1>
  <div class="meta" id="meta">načítám…</div>
</header>
<div class="filters" id="filters"></div>
<div id="list"></div>
<footer>Tipsport × Rainbet · auto-refresh 60 s · data jsou orientační, před vsazením ověř kurz</footer>

<script>
const STAT_CZ = { fouls: "fauly", cards: "žluté karty", shots: "střely" };
let DATA = null, FILTER = "all";

function fmtTime(iso) { if (!iso) return ""; const d = new Date(iso); return d.toLocaleString("cs-CZ", { day: "numeric", month: "numeric", hour: "2-digit", minute: "2-digit" }); }

function render() {
  const list = document.getElementById("list");
  if (!DATA) { list.innerHTML = '<div class="empty">Nepodařilo se načíst data.</div>'; return; }
  const opps = (DATA.opportunities || []).filter(o => FILTER === "all" || o.stat === FILTER);
  document.getElementById("meta").textContent =
    `aktualizováno ${fmtTime(DATA.generatedAt)} · ${DATA.opportunitiesFound || 0} příležitostí · ${DATA.matchesPaired || 0} spárováno`;

  // filtry
  const counts = {}; (DATA.opportunities || []).forEach(o => counts[o.stat] = (counts[o.stat] || 0) + 1);
  const fdiv = document.getElementById("filters");
  const chips = [["all", "Vše", (DATA.opportunities || []).length]].concat(
    Object.keys(STAT_CZ).map(s => [s, STAT_CZ[s], counts[s] || 0]));
  fdiv.innerHTML = chips.map(([k, lbl, n]) =>
    `<span class="chip ${FILTER === k ? "active" : ""}" data-f="${k}">${lbl} ${n}</span>`).join("");
  fdiv.querySelectorAll(".chip").forEach(c => c.onclick = () => { FILTER = c.dataset.f; render(); });

  if (!opps.length) { list.innerHTML = '<div class="empty">Žádné surebety pro tento filtr.</div>'; return; }
  list.innerHTML = opps.map(o => `
    <div class="card">
      <div class="top">
        <div>
          <div class="match"><span class="stat">${o.stat}</span>${o.match}</div>
          <div class="sub">${o.market} · výkop ${fmtTime(o.startTime)}</div>
        </div>
        <div class="profit">+${o.profitPct}%</div>
      </div>
      <table>${o.legs.map(l => `
        <tr><td>${l.label}</td>
            <td class="odd">${l.odd} <span class="book">@ ${l.bookmaker}</span></td>
            <td class="stake">${l.stake} ${o.currency}</td></tr>`).join("")}
      </table>
      <div class="sub">vklad ${o.stakeTotal} ${o.currency} → zisk ${o.guaranteedProfit} ${o.currency}</div>
      ${o.metricNote ? `<div class="warn">⚠️ ${o.metricNote}</div>` : ""}
    </div>`).join("");
}

async function load() {
  try {
    const r = await fetch("arbitrage_stats.json?t=" + Date.now(), { cache: "no-store" });
    DATA = await r.json();
  } catch (e) { DATA = DATA || null; }
  render();
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
